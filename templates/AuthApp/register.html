{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - AutoTube AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card border-0 p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Join AutoTube AI</h2>
                <p class="text-muted">Start optimizing your content today.</p>
            </div>
            
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3 fw-bold shadow-sm">Create Account</button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Log in here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
