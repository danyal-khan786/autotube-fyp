{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - AutoTube AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card border-0 p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-box-arrow-in-right fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Welcome Back</h2>
                <p class="text-muted">Log in to your creator dashboard.</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3 fw-bold shadow-sm">Log In</button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Sign up here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
